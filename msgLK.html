<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私信对话</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    max-width:600px;
    margin:0 auto;
    border-left:1px solid #eee;
    border-right:1px solid #eee;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}
.back{
    padding:12px 16px;
    font-size:18px;
    color:#1d9bf0;
    text-decoration:none;
    display:block;
}
.head{
    padding:14px 16px;
    border-bottom:1px solid #eee;
    display:flex;
    gap:12px;
    align-items:center;
}
.ava{
    width:44px;
    height:44px;
    border-radius:50%;
    background:url("images/LK.jpg") center/cover;
    cursor:pointer;
}
.info .n{
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
}
.info .id{
    font-size:13px;
    color:#777;
}
.box{
    flex:1;
    padding:16px;
    overflow-y: auto;
}
/* 对方发来的消息 灰色左气泡 */
.other{
    background:#f1f1f1;
    padding:10px 12px;
    border-radius:12px 12px 12px 4px;
    max-width:85%;
    margin-bottom:12px;
    line-height:1.6;
    white-space:pre-line;
}
/* 玩家自己发送的消息 蓝色右气泡 */
.me{
    margin-left:auto;
    background:#1d9bf0;
    color:#fff;
    padding:10px 12px;
    border-radius:12px 12px 4px 12px;
    max-width:85%;
    margin-bottom:12px;
    text-align:right;
    white-space:pre-line;
}
.time-divider{
    text-align:center;
    color:#aaa;
    font-size:14px;
    margin:16px 0;
}
/* 气泡内链接：默认下划线，灰色气泡用深色链接 */
.other a{
    color:#0055cc;
    text-decoration:underline;
}
/* 自己蓝色气泡里的链接白色下划线 */
.me a{
    color:#ffffff;
    text-decoration:underline;
}
</style>
</head>
<body>
<!-- 返回：玩家通讯消息列表页 -->
<a class="back" href="home.html#message">←</a>

<div class="head">
    <div class="ava" onclick="location.href='LK.html'"></div>
    <div class="info">
        <div class="n" onclick="location.href='LK.html'">LK411</div>
        <div class="id">@The_Creator</div>
    </div>
</div>

<div class="box">
  <div class="time-divider">1min</div>
    <div class="other">嗨。我是LK411</div>
    <div class="other">看起来你遇到了一点麻烦。</div>
        <div class="other">游戏所有内容均一人制作，目前版本：1.0.0
如有需要可以加QQ群等待通知更新：1057527943
     </div>
    <div class="other">你有什么问题都可以问我。
如果你想沉浸式在只言片语中解密，请忽略我。
如果你遇到了一些小问题，可以试着点击

<a href="target.html">当期任务</a>
提醒：往期任务包括不涉及具体内容的分支，当期任务仅有目前版本更新的主线任务
    在最终想法的回答里，通过输入有关联性的词语
    来进行猜想的验证。
    值得一提的是，有些未完整的猜想不会成为答案，目前已开放：2种*主线*猜想验证
    0个*支线*猜想验证。</div>


</div>
</body>
</html>
