<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    background:#000;
    color:#fff;
    font-family:system-ui,-apple-system,sans-serif;
    max-width:600px;
    margin:0 auto;
    border-left:1px solid #333;
    border-right:1px solid #333;
    min-height:100vh;
}
/* 顶部个人信息栏 */
.profile-header{
    padding:16px;
    border-bottom:1px solid #333;
}
.avatar{
    width:72px;
    height:72px;
    border-radius:50%;
    background:#444;
    margin-bottom:10px;
}
.username{
    font-size:20px;
    font-weight:bold;
    margin-bottom:4px;
}
.user-id{
    color:#888;
    margin-bottom:12px;
}
/* 推文Tab切换 */
.tab-wrap{
    display:flex;
    border-bottom:1px solid #333;
}
.tab-item{
    flex:1;
    text-align:center;
    padding:14px 0;
    color:#aaa;
    cursor:pointer;
    position:relative;
}
.tab-item.active{
    color:#fff;
}
.tab-item.active::after{
    content:"";
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:50px;
    height:4px;
    background:#1d9bf0;
    border-radius:2px;
}
/* 信息流容器 支持原生上下滑动 */
.feed-box{
    overflow-y:auto;
    height:calc(100vh - 240px);
}
/* 单条推文卡片 */
.tweet-card{
    padding:14px 16px;
    border-bottom:1px solid #333;
    display:flex;
    gap:12px;
}
.tweet-avatar{
    width:48px;
    height:48px;
    border-radius:50%;
    background:#333;
    flex-shrink:0;
}
.tweet-content{
    flex:1;
}
.tweet-name-row{
    display:flex;
    gap:6px;
    align-items:center;
    margin-bottom:6px;
}
.tweet-name{
    font-weight:bold;
}
.tweet-tag{
    color:#888;
}
.tweet-text{
    line-height:1.5;
    font-size:15px;
    color:#eee;
}
/* 板块默认隐藏，active才显示 */
.tab-panel{
    display:none;
}
.tab-panel.show{
    display:block;
}
</style>
</head>
<body>
<!-- 个人资料头部 -->
<div class="profile-header">
    <div class="avatar"></div>
    <div class="username">你的账号名</div>
    <div class="user-id">@userid123</div>
    <p>这里写个人简介，仿X主页简介文案</p>
</div>

<!-- Tab栏 -->
<div class="tab-wrap">
    <div class="tab-item active" data-tab="post">帖子</div>
    <div class="tab-item" data-tab="reply">回复</div>
    <div class="tab-item" data-tab="media">媒体</div>
    <div class="tab-item" data-tab="like">喜欢</div>
</div>

<!-- 可上下滑动信息流区域 -->
<div class="feed-box">
    <!-- 帖子面板 -->
    <div class="tab-panel show" id="post">
        <div class="tweet-card">
            <div class="tweet-avatar"></div>
            <div class="tweet-content">
                <div class="tweet-name-row">
                    <span class="tweet-name">访客A</span>
                    <span class="tweet-tag">@guest001 · 1小时</span>
                </div>
                <div class="tweet-text">第一条留言内容，你可以在这里填充剧情线索、伏笔文字</div>
            </div>
        </div>
        <div class="tweet-card">
            <div class="tweet-avatar"></div>
            <div class="tweet-content">
                <div class="tweet-name-row">
                    <span class="tweet-name">访客B</span>
                    <span class="tweet-tag">@guest002 · 3小时</span>
                </div>
                <div class="tweet-text">第二条留言，埋藏解谜关键信息，和主页面线索呼应</div>
            </div>
        </div>
    </div>

    <!-- 回复面板 -->
    <div class="tab-panel" id="reply">
        <div class="tweet-card">
            <div class="tweet-avatar"></div>
            <div class="tweet-content">
                <div class="tweet-name-row">
                    <span class="tweet-name">访客C</span>
                    <span class="tweet-tag">@guest003 · 半天</span>
                </div>
                <div class="tweet-text">这条是回复内容，可以放互动对话类线索</div>
            </div>
        </div>
    </div>

    <!-- 媒体面板 -->
    <div class="tab-panel" id="media">
        <div class="tweet-card">
            <div class="tweet-avatar"></div>
            <div class="tweet-content">
                <div class="tweet-name-row">
                    <span class="tweet-name">系统上传</span>
                    <span class="tweet-tag">@media · 2天</span>
                </div>
                <div class="tweet-text">此处可以插入图片、照片类线索</div>
            </div>
        </div>
    </div>

    <!-- 喜欢面板 -->
    <div class="tab-panel" id="like">
        <div class="tweet-card">
            <div class="tweet-avatar"></div>
            <div class="tweet-content">
                <div class="tweet-name-row">
                    <span class="tweet-name">他人帖子</span>
                    <span class="tweet-tag">@other · 4天</span>
                </div>
                <div class="tweet-text">被点赞收藏的关键帖子，隐藏伏笔</div>
            </div>
        </div>
    </div>
</div>

<script>
// 获取所有标签和面板
const tabs = document.querySelectorAll('.tab-item');
const panels = document.querySelectorAll('.tab-panel');

tabs.forEach(tab => {
    tab.onclick = function(){
        // 清空所有激活样式
        tabs.forEach(t => t.classList.remove('active'));
        panels.forEach(p => p.classList.remove('show'));
        // 当前标签激活
        this.classList.add('active');
        // 对应面板显示
        const targetId = this.getAttribute('data-tab');
        document.getElementById(targetId).classList.add('show');
    }
})
</script>
</body>
</html>
