<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>往期任务消息面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:rgba(0,0,0,0.75); /* 半透明深色背景 */
    min-height:100vh;
    padding:40px 20px;
    max-width:650px;
    margin:0 auto;
}
.back{
    color:#74b9ff;
    text-decoration:none;
    margin-bottom:30px;
    display:inline-block;
}
.title{
    color:#fff;
    font-size:22px;
    margin-bottom:35px;
    text-align:center;
}
/* 单条手机推送消息卡片 */
.msg-card{
    background:#222222;
    border:1px solid #444;
    border-radius:16px;
    padding:18px;
    margin-bottom:16px;
}
.msg-top{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
}
.msg-name{
    color:#ccc;
    font-size:14px;
}
.msg-time{
    color:#888;
    font-size:12px;
}
.msg-text{
    color:#eee;
    font-size:15px;
    line-height:1.6;
}
</style>
</head>
<body>
<!-- 直接跳转到消息主页，不是回退历史记录 -->
<a class="back" href="home.html#message">← 返回消息列表</a>
<div class="title">往期消息通知</div>

<!-- 第一条：最新 -->
<div class="msg-card">
    <div class="msg-top">
        <span class="msg-name">LK411</span>
        <span class="msg-time">1.0.0</span>
    </div>
    <div class="msg-text">找到未知账号背后的真相</div>
</div>

<!-- 第二条 -->
<div class="msg-card">
    <div class="msg-top">
        <span class="msg-name">未知</span>
        <span class="msg-time">0.0.1</span>
    </div>
    <div class="msg-text">支线1：机会主义者</div>
</div>

</body>
</html>
