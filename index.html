<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BATARG</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background-color: #222222; /* 灰黑色底色 */
    min-height: 100vh;
    padding: 60px 30px;
    max-width: 850px;
    margin: 0 auto;
}
p {
    color: #ffffff;
    /* 文字白色+黑色描边 */
    text-shadow: 1px 1px 2px #000, -1px -1px 2px #000, 1px -1px 2px #000, -1px 1px 2px #000;
    font-size: 17px;
    line-height: 1.8;
    margin-bottom: 24px;
}
.title-main {
    font-size: 28px;
    text-align: center;
    margin-bottom: 40px;
    color: #fff;
    text-shadow: 1px 1px 3px #000, -1px -1px 3px #000;
}
.search-area {
    margin-top: 50px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
}
#search-input {
    flex: 1;
    min-width: 260px;
    padding: 10px 14px;
    background: #333;
    border: 1px solid #666;
    color: #fff;
    font-size: 16px;
}
/* 开始探索按钮：黑底、红字、红色边框 */
#explore-btn {
    background-color: #000000;
    border: 2px solid #ff2222;
    width: 48px;
    height: 48px;
    padding: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
#explore-btn:hover {
    background: #111;
}
/* 个人主页可点击链接 */
.homepage-link {
    display: inline-block;
    margin: 20px 0;
    color: #fff;
    text-shadow: 1px 1px 2px #000;
    text-decoration: underline;
    font-size: 16px;
    cursor: pointer;
}
/* 新增Real Batman输入区域样式 */
.realbat-area{
    margin-top: 45px;
    padding-top: 30px;
    border-top: 1px solid #444444;
}
.realbat-area label{
    color: #ffffff;
    text-shadow: 1px 1px 2px #000;
    font-size: 18px;
    display: block;
    margin-bottom: 12px;
}
#bat-input{
    width: 76%;
    padding: 10px 14px;
    background: #333;
    border: 1px solid #666;
    color: #fff;
    font-size: 16px;
}
#bat-submit{
    background-color: #000;
    color: #ff2222;
    border: 2px solid #ff2222;
    padding: 10px 18px;
    cursor: pointer;
}
.footer-note {
    margin-top: 80px;
    font-size: 10px;
    color: #aaa;
    text-align: center;
    text-shadow: none;
    line-height: 1.6;
}
</style>
</head>
<body>
<div class="title-main">寻找BATMAN</div>

<p>2010年7月，你开玩笑般发布了一则蝙蝠侠是否换人的帖子，引发了大量讨论。</p>
    <p>在这些留言中，你发现某个神秘的账号。随着你的继续探索，你发觉有关蝙蝠侠的事情可能并不简单。</p>

<p>你可以在下方检索框输入关键词在互联网快速检索，也可以通过浏览你的个人主页进行查看。
   <p> 在你的个人主页里，你可以点击给你留言的账号进行Ta主页的查看。</p>
<p>你要做的事就是从文本里寻找线索词条，推理得到假设和真相。</p>

<a class="homepage-link" href="home.html">点击进入个人主页</a>

<div class="search-area">
    <input id="search-input" placeholder="在此输入关键词检索档案">
    <button id="explore-btn"> 
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#ff2222" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    </button>
</div>

 
<!-- 新增Real Batman输入栏目 -->
<div class="realbat-area">
    <!-- 重置按钮，放在提交按钮上方 -->
<button id="resetBtn" 
style="margin-bottom:6px;font-size:11px;padding:2px 8px;background:#000;color:#ff2222;border:2px solid #ff2222;cursor:pointer;"
onclick="localStorage.removeItem('warnCount');alert('警告次数已重置，页面即将刷新');location.reload();">
重置记录
</button>
    <label>Your final inference:</label>
    <input id="bat-input" placeholder="输入你的最终想法（词语/句子）">
    <button id="bat-submit">提交答案</button>
</div>

<div class="footer-note">
    存档批次：1<br>
    所有涉及人名、地名、包括内容全为捏造。和官方时间对不上是正常现象，请勿上纲上线。<br>
    剧本：LK411<br>
    制作：LK411、GITHUB、豆包<br>
</div>

<!--
【隐藏线索 仅查看网页源代码可见】
后续可在这里写入密码、隐藏页面地址、伏笔
-->

<script>// 在这里添加你后续需要的【关键词-对应网页】映射
const keywordJump = {
    "蝙蝠侠": "batman.html",
    "换人": "change.html",
    "帖子": "post.html"
};

const inputDom = document.getElementById('search-input');
const btnDom = document.getElementById('explore-btn');

// 点击按钮检索
btnDom.onclick = function(){
    let word = inputDom.value.trim();
    if(keywordJump[word]){
        window.location.href = keywordJump[word];
    }else{
        alert("未检索到相关档案，请更换关键词");
    }
}
// 回车直接搜索
inputDom.onkeydown = function(e){
    if(e.key === "Enter") btnDom.click();
}

// ============ 新增：Real Batman 输入+警告封禁逻辑 ============
// 读取警告次数，页面刷新不会清零
if(!localStorage.getItem("warnCount")){
    localStorage.setItem("warnCount", 0);
}
let warnCount = Number(localStorage.getItem("warnCount"));

const batInput = document.getElementById("bat-input");
const batSubmitBtn = document.getElementById("bat-submit");
// 正确答案跳转的结局页面文件名
const endPageUrl = "ending.html";
// 五次违规后跳转的封禁空白页
const banPageUrl = "blank.html";

batSubmitBtn.onclick = function(){
    let userText = batInput.value.trim();
    if(userText.includes("布鲁斯") && userText.includes("蝙蝠侠")){
        warnCount += 1;
        localStorage.setItem("warnCount", warnCount);

        switch(warnCount){
            case 1:
                alert("此内容无法输出");
                break;
            case 2:
            case 3:
            case 4:
                alert("你已经受到警告，禁止向互联网输出类似内容");
                break;
            case 5:
                location.href = endPageUrl;
                break;
            default:
                location.href = banPageUrl;
                break;
        }
    }
    // else 直接删掉，不含违禁词什么都不做，不跳转结局
}
// 输入框回车等同于点击提交
batInput.onkeydown = function(e){
    if(e.key === "Enter") batSubmitBtn.click();
}

// 自定义无域名弹窗代码
(function(){
    const mask = document.getElementById('mask');
    const box = document.getElementById('myAlert');
    const text = document.getElementById('alertText');
    const btn = document.getElementById('alertBtn');

    window.alert = function(msg){
        text.innerText = msg;
        mask.style.display = 'block';
        box.style.display = 'block';
    }

    btn.onclick = function(){
        mask.style.display = 'none';
        box.style.display = 'none';
    }
    mask.onclick = function(){
        mask.style.display = 'none';
        box.style.display = 'none';
    }
})();
</script>
    <div id="mask" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;"></div>
<div id="myAlert" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:32px 40px;border-radius:16px;z-index:1000;min-width:320px;">
    <p id="alertText" style="font-size:22px;margin:0 0 30px 0;"></p>
    <button id="alertBtn" style="display:block;margin:0 auto;border:none;background:#1677ff;color:#fff;padding:10px 36px;border-radius:99px;font-size:18px;cursor:pointer;">确定</button>
</div>
</body>
</html>
