<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账户已注销</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    background:#ffffff;
    color:#000000;
    font-family:system-ui,-apple-system,sans-serif;
    max-width:600px;
    margin:0 auto;
    border-left:1px solid #eee;
    border-right:1px solid #eee;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}
a{
    color:inherit;
    text-decoration:none;
}
/* 顶部个人信息栏 */
.profile-header{
    padding:16px;
    border-bottom:1px solid #eeeeee;
}
.avatar{
    width:72px;
    height:72px;
    border-radius:50%;
    background:url("images/default.jpg") center/cover;
    margin-bottom:10px;
}
.username{
    font-size:20px;
    font-weight:bold;
    margin-bottom:4px;
}
.user-id{
    color:#777777;
    margin-bottom:12px;
}
/* 推文Tab切换 全部置灰禁止点击 */
.tab-wrap{
    display:flex;
    border-bottom:1px solid #eeeeee;
}
.tab-item{
    flex:1;
    text-align:center;
    padding:14px 0;
    color:#aaaaaa;
    cursor:default;
    position:relative;
    pointer-events: none;
}
/* 注销页面无激活下划线 */
.tab-item.active::after{
    display: none;
}
/* 信息流容器 自适应高度不留空白 */
.feed-box{
    overflow-y:auto;
    flex:1;
    display: flex;
    align-items: center;
    justify-content: center;
    color:#999;
    font-size:16px;
}
</style>
</head>
<body>
<!-- 蓝色返回按钮，回到玩家主页home.html -->
<a onclick="location.href='home.html'" style="display:inline-block;color:#1d9bf0;text-decoration:none;font-size:18px;padding:12px 16px;">← 返回我的主页</a>

<!-- 头部信息：头像、用户名、ID 固定账户已注销信息 -->
<div class="profile-header">
    <a href="new_delete.html">
        <div class="avatar"></div>
    </a>
    <a href="new_delete.html" class="username">账户已注销</a>
    <br>
    <a href="new_delete.html" class="user-id">@  </a>
</div>

<!-- 三栏全部灰色禁用，无法点击切换 -->
<div class="tab-wrap">
    <div class="tab-item">帖子</div>
    <div class="tab-item">回复</div>
    <div class="tab-item">媒体</div>
</div>

<!-- 下方整块区域居中提示文案 -->
<div class="feed-box">
该账户已注销
</div>

</body>
</html>
