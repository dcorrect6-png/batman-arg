<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    background:#ffffff;
    color:#000000;
    font-family:system-ui,-apple-system,sans-serif;
    max-width:600px;
    margin:0 auto;
    border-left:1px solid #eee;
    border-right:1px solid #eee;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}
a{
    color:inherit;
    text-decoration:none;
}
/* 顶部个人信息栏 */
.profile-header{
    padding:16px;
    border-bottom:1px solid #eeeeee;
}
.avatar{
    width:72px;
    height:72px;
    border-radius:50%;
    background:url("images/user.jpg") center/cover;
    margin-bottom:10px;
}
.username{
    font-size:20px;
    font-weight:bold;
    margin-bottom:4px;
}
.user-id{
    color:#777777;
    margin-bottom:12px;
}
/* 推文Tab切换 */
.tab-wrap{
    display:flex;
    border-bottom:1px solid #eeeeee;
}
.tab-item{
    flex:1;
    text-align:center;
    padding:14px 0;
    color:#777;
    cursor:pointer;
    position:relative;
}
.tab-item.active{
    color:#000;
}
.tab-item.active::after{
    content:"";
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:50px;
    height:4px;
    background:#1d9bf0;
    border-radius:2px;
}
/* 信息流容器 自适应高度不留空白 */
.feed-box{
    overflow-y:auto;
    flex:1;
}
/* 单条推文卡片 整块可点击 */
.tweet-card{
    padding:14px 16px;
    border-bottom:1px solid #eeeeee;
    display:flex;
    gap:12px;
    cursor:pointer;
}
.tweet-card:hover{
    background:#f7f7f7;
}
.tweet-avatar{
    width:48px;
    height:48px;
    border-radius:50%;
    background:url("images/default.jpg") center/cover;
    flex-shrink:0;
}
.tweet-content{
    flex:1;
}
.tweet-name-row{
    display:flex;
    gap:6px;
    align-items:center;
    margin-bottom:6px;
}
.tweet-name{
    font-weight:bold;
}
.tweet-tag{
    color:#777777;
}
.tweet-text{
    line-height:1.5;
    font-size:15px;
    color:#222222;
}
/* 板块默认隐藏，active才显示 */
.tab-panel{
    display:none;
}
.tab-panel.show{
    display:block;
}
</style>
</head>
<body>
<!-- 个人资料头部 头像+名字可点进自己主页 -->
<div class="profile-header">
    <a href="home.html">
        <div class="avatar"></div>
    </a>
    <a href="home.html" class="username">你的账号名</a>
    <br>
    <a href="home.html" class="user-id">@userid123</a>
    <p>这里写个人简介，仿X主页简介文案</p>
</div>

<!-- Tab栏：喜欢 → 私信（通讯） -->
<div class="tab-wrap">
    <div class="tab-item active" data-tab="post">帖子</div>
    <div class="tab-item" data-tab="reply">回复</div>
    <div class="tab-item" data-tab="media">媒体</div>
    <div class="tab-item" data-tab="message">私信（通讯）</div>
</div>

<!-- 可上下滑动信息流区域 -->
<div class="feed-box">
    <!-- 帖子面板 -->
    <div class="tab-panel show" id="post">
        <a href="detail1.html" class="tweet-card">
            <div>
                <a href="userA.html">
                    <div class="tweet-avatar" style="background:url('images/user (1).jpg') center/cover;"></div>
                </a>
            </div>
            <div class="tweet-content">
                <div class="tweet-name-row">
                    <a href="userA.html" class="tweet-name">访客A</a>
                    <span class="tweet-tag">@guest001 · 1小时</span>
                </div>
                <div class="tweet-text">第一条留言内容，你可以在这里填充剧情线索、伏笔文字</div>
            </div>
        </a>

        <a href="detail2.html" class="tweet-card">
            <div>
                <a href="userB.html">
                    <div class="tweet-avatar" style="background:url('images/user (2).jpg') center/cover;"></div>
                </a>
            </div>
            <div class="tweet-content">
                <div class="tweet-name-row">
                    <a href="userB.html" class="tweet-name">访客B</a>
                    <span class="tweet-tag">@guest002 · 3小时</span>
                </div>
                <div class="tweet-text">第二条留言，埋藏解谜关键信息，和主页面线索呼应</div>
            </div>
        </a>
    </div>

    <!-- 回复面板 -->
    <div class="tab-panel" id="reply">
        <a href="reply1.html" class="tweet-card">
            <div>
                <a href="userC.html">
                    <div class="tweet-avatar" style="background:url('images/user (3).jpg') center/cover;"></div>
                </a>
            </div>
            <div class="tweet-content">
                <div class="tweet-name-row">
                    <a href="userC.html" class="tweet-name">访客C</a>
                    <span class="tweet-tag">@guest003 · 半天</span>
                </div>
                <div class="tweet-text">这条是回复内容，可以放互动对话类线索</div>
            </div>
        </a>
    </div>

    <!-- 媒体面板 -->
    <div class="tab-panel" id="media">
        <a href="media1.html" class="tweet-card">
            <div>
                <a href="mediaUser.html">
                    <div class="tweet-avatar" style="background:url('images/user (4).jpg') center/cover;"></div>
                </a>
            </div>
            <div class="tweet-content">
                <div class="tweet-name-row">
                    <a href="mediaUser.html" class="tweet-name">系统上传</a>
                    <span class="tweet-tag">@media · 2天</span>
                </div>
                <div class="tweet-text">此处可以插入图片、照片类线索</div>
            </div>
        </a>
    </div>

    <!-- 原喜欢栏改为 私信（通讯）面板 -->
    <div class="tab-panel" id="message">
        <a href="msg1.html" class="tweet-card">
            <div>
                <a href="msgUser.html">
                    <div class="tweet-avatar" style="background:url('images/user (5).jpg') center/cover;"></div>
                </a>
            </div>
            <div class="tweet-content">
                <div class="tweet-name-row">
                    <a href="msgUser.html" class="tweet-name">联络人</a>
                    <span class="tweet-tag">@contact · 4天</span>
                </div>
                <div class="tweet-text">私密通讯对话内容，可存放关键密码与隐藏线索</div>
            </div>
        </a>
    </div>
</div>

<script>
// 标签页切换逻辑同步修改对应ID
const tabs = document.querySelectorAll('.tab-item');
const panels = document.querySelectorAll('.tab-panel');
tabs.forEach(tab => {
    tab.onclick = function(){
        tabs.forEach(t => t.classList.remove('active'));
        panels.forEach(p => p.classList.remove('show'));
        this.classList.add('active');
        const targetId = this.getAttribute('data-tab');
        document.getElementById(targetId).classList.add('show');
    }
})
</script>
</body>
</html>
