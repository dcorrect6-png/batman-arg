<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私密通讯对话</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    background:#fff;
    max-width:600px;
    margin:0 auto;
    border-left:1px solid #eee;
    border-right:1px solid #eee;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}
/* 顶部对方信息栏 */
.chat-header{
    padding:12px 16px;
    border-bottom:1px solid #eee;
    display:flex;
    align-items:center;
    gap:10px;
}
.back-btn{
    color:#1d9bf0;
    text-decoration:none;
    font-size:18px;
}
.chat-avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    background:url("images/default.jpg") center/cover;
}
.chat-name{
    font-weight:bold;
}
.chat-id{
    font-size:13px;
    color:#777;
}
/* 聊天消息区域，可滚动 */
.chat-box{
    flex:1;
    overflow-y:auto;
    padding:16px;
}
/* 对方消息 居左 */
.msg-other{
    max-width:80%;
    background:#f2f2f2;
    padding:10px 14px;
    border-radius:18px 18px 18px 4px;
    margin-bottom:12px;
}
/* 自己消息 居右 */
.msg-self{
    max-width:80%;
    margin-left:auto;
    background:#1d9bf0;
    color:white;
    padding:10px 14px;
    border-radius:18px 18px 4px 18px;
    margin-bottom:12px;
}
.time-tip{
    font-size:11px;
    color:#999;
    text-align:center;
    margin:8px 0;
}
</style>
</head>
<body>
<div class="chat-header">
    <a class="back-btn" onclick="history.back()">←</a>
    <div class="chat-avatar"></div>
    <div>
        <div class="chat-name">账户已注销</div>
        <div class="chat-id">@  </div>
    </div>
</div>

<div class="chat-box">
    <div class="time-tip">一年前</div>
    <!-- 对方发来消息 -->
    <div class="msg-other">
        我们之间的协议不是这么说的！我的钱呢？
    </div>
    <!-- 你可以继续往下加多条对话 -->
    <div class="msg-self">
        你是哪位？
    </div>
    <div class="msg-other">
        我知道你的全部秘密，我警告你，你最好把我的一百万给我
    </div>
   <div class="msg-self">
        你发错人了吧？你再这样骚扰我，我就要报警了
    </div>
  <div class="time-tip">一年前</div>
    <div class="msg-other">
        你都做了什么?丽莎为什么会死？
    </div>
  <div class="msg-self">
        丽莎？你别血口喷人，你是不是精神病啊？
    </div>
   <div class="msg-other">
        ……你对得起自己的良心吗？你用那些照片给你自己赚的钱还不够多吗？
     为什么要害死我的女儿？
    </div>
  <div class="msg-self">
        嘿，你是乔·凯米吧？我敢肯定你对我有什么误会，我根本不认识什么丽莎。
    </div>
     <div class="msg-other">
        丽莎活活被人烧死了。你也会不得好死。
    </div>
   <div class="time-tip">一年前</div>
   <div class="msg-other">
        我要揭发你。
    </div>
  <div class="msg-self">
        你这个疯子。我要报警了。
    </div>
    <div class="msg-self">
        等着瞧吧。
    </div>
</div>
</body>
</html>
