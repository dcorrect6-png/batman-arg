<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帖子存档</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background-color: #222222; /* 灰黑色底色 */
    min-height: 100vh;
    padding: 60px 30px;
    max-width: 850px;
    margin: 0 auto;
}
p {
    color: #ffffff;
    /* 文字白色+黑色描边 */
    text-shadow: 1px 1px 2px #000, -1px -1px 2px #000, 1px -1px 2px #000, -1px 1px 2px #000;
    font-size: 17px;
    line-height: 1.8;
    margin-bottom: 24px;
}
.title-main {
    font-size: 28px;
    text-align: center;
    margin-bottom: 40px;
    color: #fff;
    text-shadow: 1px 1px 3px #000, -1px -1px 3px #000;
}
.search-area {
    margin-top: 50px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
}
#search-input {
    flex: 1;
    min-width: 260px;
    padding: 10px 14px;
    background: #333;
    border: 1px solid #666;
    color: #fff;
    font-size: 16px;
}
/* 开始探索按钮：黑底、红字、红色边框 */
#explore-btn {
    background-color: #000000;
    color: #ff2222;
    border: 2px solid #ff2222;
    padding: 10px 22px;
    font-size: 16px;
    cursor: pointer;
}
#explore-btn:hover {
    background: #111;
}
/* 个人主页可点击链接 */
.homepage-link {
    display: inline-block;
    margin: 20px 0;
    color: #fff;
    text-shadow: 1px 1px 2px #000;
    text-decoration: underline;
    font-size: 16px;
    cursor: pointer;
}
.footer-note {
    margin-top: 80px;
    font-size: 10px;
    color: #aaa;
    text-align: center;
    text-shadow: none;
}
</style>
</head>
<body>
<div class="title-main">帖子存档检索系统</div>

<p>2010年7月，你开玩笑般发了一则蝙蝠侠是否换人的帖子，引发了大量讨论。</p>

<p>你可以在下方检索框输入关键词调取相关内容，也可以点击个人主页进行查看。
你要做的事就是试着从文本里寻找线索词条，一步步拼凑真相。</p>

<a class="homepage-link" href="home.html">点击进入个人主页</a>

<div class="search-area">
    <input id="search-input" placeholder="在此输入关键词检索档案">
    <button id="explore-btn">开始探索</button>
</div>

<div class="footer-note">
    存档批次：1
    所有涉及人名、地名、包括内容全为捏造。和官方时间对不上是正常现象，请勿上纲上线。
    剧本：LK411
    制作：LK411、GITHUB、豆包
</div>

<!--
【隐藏线索 仅查看网页源代码可见】
后续可在这里写入密码、隐藏页面地址、伏笔
-->

<script>
// 在这里添加你后续需要的【关键词-对应网页】映射
const keywordJump = {
    "蝙蝠侠": "batman.html",
    "换人": "change.html",
    "帖子": "post.html"
};

const inputDom = document.getElementById('search-input');
const btnDom = document.getElementById('explore-btn');

// 点击按钮检索
btnDom.onclick = function(){
    let word = inputDom.value.trim();
    if(keywordJump[word]){
        window.location.href = keywordJump[word];
    }else{
        alert("未检索到相关档案，请更换关键词");
    }
}
// 回车直接搜索
inputDom.onkeydown = function(e){
    if(e.key === "Enter") btnDom.click();
}
</script>
</body>
</html>
